<body>
  <div id="root"></div>
  <script type="text/javascript">
    const { useState, useEffect, useMemo } = React;
    const h = React.createElement;

    // ─── Pure CSS Bar Chart Components ───
    function HBarChart({ data, labelKey, valueKey, maxVal, colorFn, labelWidth }) {
      const mx = maxVal || Math.max(...data.map(d => d[valueKey]));
      const lw = labelWidth || 140;
      return h('div', { style: { display: 'flex', flexDirection: 'column', gap: 6 } },
        data.map((d, i) => h('div', { key: i, style: { display: 'flex', alignItems: 'center', gap: 8 } },
          h('div', { style: { width: lw, fontSize: 12, color: '#555', textAlign: 'right', flexShrink: 0 } }, d[labelKey]),
          h('div', { style: { flex: 1, background: '#eee', borderRadius: 4, height: 22, position: 'relative', overflow: 'hidden' } },
            h('div', { style: { width: (d[valueKey] / mx * 100) + '%', height: '100%', background: colorFn ? colorFn(d, i) : '#1F4E79', borderRadius: 4, transition: 'width 0.5s ease' } }),
            h('span', { style: { position: 'absolute', right: 6, top: 2, fontSize: 11, fontWeight: 600, color: d[valueKey]/mx > 0.5 ? 'white' : '#333' } }, d[valueKey])
          )
        ))
      );
    }

    function VBarChart({ data, labelKey, valueKey, colorFn, height }) {
      const mx = Math.max(...data.map(d => d[valueKey]));
      const ht = height || 200;
      return h('div', { style: { display: 'flex', alignItems: 'flex-end', gap: 8, height: ht, padding: '0 8px' } },
        data.map((d, i) => h('div', { key: i, style: { flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 } },
          h('span', { style: { fontSize: 11, fontWeight: 600, color: '#333' } }, d[valueKey]),
          h('div', { style: { width: '100%', maxWidth: 48, height: (d[valueKey] / mx * (ht - 40)) + 'px', background: colorFn ? colorFn(d, i) : '#1F4E79', borderRadius: '4px 4px 0 0', transition: 'height 0.5s ease', minHeight: 2 } }),
          h('span', { style: { fontSize: 10, color: '#666', textAlign: 'center', transform: 'rotate(-30deg)', transformOrigin: 'top center', whiteSpace: 'nowrap' } }, d[labelKey])
        ))
      );
    }

    function DonutChart({ data, colors, size }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      const sz = size || 200;
      let cumAngle = 0;
      const paths = data.map((d, i) => {
        const angle = (d.value / total) * 360;
        const startAngle = cumAngle;
        cumAngle += angle;
        const startRad = (startAngle - 90) * Math.PI / 180;
        const endRad = (cumAngle - 90) * Math.PI / 180;
        const r = sz / 2 - 10;
        const cx = sz / 2, cy = sz / 2;
        const x1 = cx + r * Math.cos(startRad), y1 = cy + r * Math.sin(startRad);
        const x2 = cx + r * Math.cos(endRad), y2 = cy + r * Math.sin(endRad);
        const large = angle > 180 ? 1 : 0;
        const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
        return h('path', { key: i, d: path, fill: colors[i % colors.length], stroke: 'white', strokeWidth: 2 });
      });
      return h('div', { style: { display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' } },
        h('svg', { width: sz, height: sz, viewBox: `0 0 ${sz} ${sz}` }, ...paths, h('circle', { cx: sz/2, cy: sz/2, r: sz/4, fill: 'white' })),
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } },
          data.map((d, i) => h('div', { key: i, style: { display: 'flex', alignItems: 'center', gap: 6, fontSize: 12 } },
            h('div', { style: { width: 10, height: 10, borderRadius: 2, background: colors[i % colors.length], flexShrink: 0 } }),
            h('span', null, d.name + ' (' + d.value + ')')
          ))
        )
      );
    }

    // Convert markdown text to array of React elements
    function mdToReact(text) {
      if (!text) return null;
      // Split on **bold**, *italic*, [[wikilinks]], and [links](url)
      var parts = [];
      var remaining = text;
      var key = 0;
      while (remaining.length > 0) {
        // Find earliest markdown pattern
        var boldIdx = remaining.indexOf('**');
        var wikiIdx = remaining.indexOf('[[');
        var linkIdx = remaining.search(/\[([^\]]+)\]\(/);
        var italIdx = -1;
        // Only match single * that's not part of **
        var italMatch = remaining.match(/(?<!\*)\*(?!\*)([^*]+)\*(?!\*)/);
        if (italMatch) italIdx = remaining.indexOf(italMatch[0]);

        var earliest = Infinity;
        var type = null;
        if (boldIdx >= 0 && boldIdx < earliest) { earliest = boldIdx; type = 'bold'; }
        if (wikiIdx >= 0 && wikiIdx < earliest) { earliest = wikiIdx; type = 'wiki'; }
        if (linkIdx >= 0 && linkIdx < earliest) { earliest = linkIdx; type = 'link'; }
        if (italIdx >= 0 && italIdx < earliest) { earliest = italIdx; type = 'italic'; }

        if (type === null) { parts.push(remaining); break; }

        // Push text before the pattern
        if (earliest > 0) parts.push(remaining.substring(0, earliest));

        if (type === 'bold') {
          var endBold = remaining.indexOf('**', earliest + 2);
          if (endBold === -1) { parts.push(remaining.substring(earliest)); remaining = ''; break; }
          parts.push(h('strong', { key: key++ }, remaining.substring(earliest + 2, endBold)));
          remaining = remaining.substring(endBold + 2);
        } else if (type === 'wiki') {
          var endWiki = remaining.indexOf(']]', earliest + 2);
          if (endWiki === -1) { parts.push(remaining.substring(earliest)); remaining = ''; break; }
          parts.push(h('em', { key: key++ }, remaining.substring(earliest + 2, endWiki)));
          remaining = remaining.substring(endWiki + 2);
        } else if (type === 'link') {
          var lMatch = remaining.substring(earliest).match(/\[([^\]]+)\]\(([^\)]+)\)/);
          if (!lMatch) { parts.push(remaining.substring(earliest, earliest + 1)); remaining = remaining.substring(earliest + 1); continue; }
          parts.push(h('a', { key: key++, href: lMatch[2], target: '_blank' }, lMatch[1]));
          remaining = remaining.substring(earliest + lMatch[0].length);
        } else if (type === 'italic') {
          parts.push(h('em', { key: key++ }, italMatch[1]));
          remaining = remaining.substring(earliest + italMatch[0].length);
        }
      }
      return parts;
    }

    // Render a text field that may contain markdown, splitting on newlines into paragraphs
    function MdText(props) {
      var text = props.text || '';
      var lines = text.split('\n').filter(function(l) { return l.trim().length > 0; });
      if (lines.length <= 1) {
        return h('span', null, mdToReact(text));
      }
      return h('div', null, lines.map(function(line, i) {
        var trimmed = line.trim();
        if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
          return h('div', { key: i, style: { paddingLeft: 16, marginBottom: 4 } }, '\u2022 ', mdToReact(trimmed.substring(2)));
        }
        return h('p', { key: i, style: { marginBottom: 6 } }, mdToReact(trimmed));
      }));
    }

    function cleanProduct(raw) {
      var p = (raw || '').replace(/\*\*/g, '').replace(/\[\[|\]\]/g, '');
      if (/dax copilot/i.test(p)) return 'DAX Copilot (Nuance)';
      if (/dragon ambient|nuance dax|\bDAX\b/i.test(p)) return 'DAX (Nuance)';
      if (/abridge/i.test(p) && /dax|nuance/i.test(p)) return 'DAX + Abridge';
      if (/abridge/i.test(p)) return 'Abridge';
      if (/suki/i.test(p)) return 'Suki AI';
      if (/heidi/i.test(p)) return 'Heidi Health';
      if (/ambience healthcare/i.test(p)) return 'Ambience Healthcare';
      if (/lyrebird/i.test(p)) return 'Lyrebird Health';
      if (/autoscriber/i.test(p)) return 'Autoscriber';
      if (/nabla/i.test(p)) return 'DAX vs Nabla';
      if (/medimo/i.test(p)) return 'medimo';
      if (/navina/i.test(p)) return 'Navina AI';
      if (/chatgpt|gpt-4/i.test(p)) return 'ChatGPT / GPT-4';
      if (/n\/a|systematic review|scoping review|not applicable|rapid review/i.test(p)) return 'N/A (Review)';
      if (/anonymized|unnamed|not named|two unnamed/i.test(p)) return 'Unnamed / Anonymized';
      if (/human.*scribe/i.test(p)) return 'Human Scribes (Baseline)';
      if (/BART|neural/i.test(p)) return 'Research NLP Model';
      return p.length > 30 ? p.substring(0, 28) + '...' : p || 'Not specified';
    }

    const COLORS = ['#1F4E79','#2d6da3','#4a90c4','#6db3e6','#90d4f7','#ef6c00','#c62828','#2e7d32','#7b1fa2','#00838f'];
    const DIM_COLORS = { SQ: '#7b1fa2', IQ: '#1565c0', SerQ: '#00838f', U: '#2e7d32', US: '#ef6c00', NB: '#c62828' };
    const DIM_NAMES = { SQ: 'System Quality', IQ: 'Information Quality', SerQ: 'Service Quality', U: 'Use', US: 'User Satisfaction', NB: 'Net Benefits' };

    const RIGOR_MAP = {
      'CM-01': { rating: 'HIGH', score: 90, label: 'Best Relative Quality' },
      'CM-02': { rating: 'MODERATE', score: 65, label: 'Moderate' },
      'CM-03': { rating: 'LOW', score: 30, label: 'Critical Gap' },
      'CM-04': { rating: 'MODERATE', score: 65, label: 'Moderate' },
      'CM-05': { rating: 'LOW', score: 25, label: 'Needs Work' },
      'CM-06': { rating: 'MODERATE', score: 55, label: 'Low' },
      'CM-07': { rating: 'LOW', score: 30, label: 'Emerging' },
      'CM-08': { rating: 'HIGH', score: 90, label: 'Best Relative Quality' },
      'CM-09': { rating: 'MODERATE', score: 65, label: 'Moderate' },
      'CM-10': { rating: 'HIGH', score: 85, label: 'Best Relative Quality' },
      'CM-11': { rating: 'LOW', score: 25, label: 'Needs Work' },
      'CM-12': { rating: 'META', score: 50, label: 'Methodological' },
      'CM-13': { rating: 'MODERATE', score: 65, label: 'Moderate' },
      'CM-14': { rating: 'LOW', score: 25, label: 'Needs Work' },
      'CM-15': { rating: 'LOW', score: 35, label: 'Needs Work' },
      'CM-16': { rating: 'LOW', score: 20, label: 'Critical Gap' },
      'CM-17': { rating: 'LOW', score: 15, label: 'Critically Low' },
      'CM-18': { rating: 'LOW', score: 25, label: 'Needs Work' },
      'CM-19': { rating: 'LOW', score: 15, label: 'Critically Low' },
      'CM-20': { rating: 'MODERATE', score: 55, label: 'Low' },
      'CM-21': { rating: 'HIGH', score: 85, label: 'Best Relative Quality' },
      'CM-22': { rating: 'LOW', score: 25, label: 'Needs Work' },
      'CM-23': { rating: 'MODERATE', score: 45, label: 'Needs Work' },
      'CM-24': { rating: 'LOW', score: 10, label: 'Critically Low' },
      'CM-25': { rating: 'META', score: 50, label: 'Meta-Measure' },
    };

    function getRigorBadge(id) {
      const r = RIGOR_MAP[id];
      if (!r) return null;
      const cls = r.rating === 'HIGH' ? 'badge-gold' : r.rating === 'MODERATE' ? 'badge-moderate' : r.rating === 'META' ? 'badge-meta' : r.score <= 20 ? 'badge-critical' : 'badge-low';
      return React.createElement('span', { className: `badge ${cls}` }, r.label);
    }

    function getRigorColor(score) {
      if (score >= 80) return '#2e7d32';
      if (score >= 50) return '#ef6c00';
      if (score >= 30) return '#e65100';
      return '#c62828';
    }

    function dimPill(dim) {
      const d = dim.trim().replace(/[^A-Za-z]/g,'');
      const key = ['SQ','IQ','SerQ','U','US','NB'].find(k => d.includes(k)) || d;
      return React.createElement('span', { className: `dim-pill dim-pill-${key}`, key: dim }, key);
    }

    function parseDimensions(str) {
      if (!str) return [];
      return str.split(/[,\/]/).map(s => s.trim()).filter(Boolean);
    }

    // ─── APP ───
    function App() {
      const [articles, setArticles] = useState([]);
      const [measures, setMeasures] = useState([]);
