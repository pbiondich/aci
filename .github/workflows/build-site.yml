name: Build Site Data

# Run whenever markdown files are pushed to main
on:
  push:
    branches: [main]
    paths:
      - 'Articles/**'
      - 'Canonical Measures/**'
      - 'Draft Measures/**'
      - 'D&M Dimensions/**'
      - 'Templates/**'
      - 'scripts/**'
      - 'docs/index.html'
      - 'docs/v3/**'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fix article linkage (CM + dimension paper lists)
        run: node scripts/link-article.js --all --fix

      - name: Extract data from markdown
        run: node scripts/extract-data.js

      - name: Commit updated JSON (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          git add "Canonical Measures/"*.md
          git add "D&M Dimensions/"*.md
          if git diff --staged --quiet; then
            echo "No data changes detected, skipping commit."
          else
            git commit -m "Auto-update site data from markdown sources"
            git push
          fi
